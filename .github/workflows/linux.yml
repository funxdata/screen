name: Build LinuxOS

on:
  push:
    branches:
      - main

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Ubuntu Desktop and dependencies
        run: |
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y \
               ubuntu-desktop \
               jq \
               pkg-config \
               build-essential \
               libglib2.0-dev \
               libgtk-3-dev \
               libwebkit2gtk-4.1-dev \
               libsoup-3.0-dev \
               xvfb
          
          # 设置虚拟显示器，防止 GUI 程序运行时报错
          export DISPLAY=:99
          Xvfb :99 -screen 0 1024x768x24 &

      - name: Read version from JSON
        id: version
        run: |
          echo "project=$(jq -r '.name' dytes.json)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' dytes.json)" >> $GITHUB_OUTPUT

      - name: Build Release
        run: |
          cargo build --release

      - name: Prepare upload directory
        run: |
          mkdir -p upload
          cp target/release/screen upload/

      - name: Upload to UpYun S3
        uses: shallwefootball/s3-upload-action@master
        with:
          aws_key_id: ${{ secrets.UPYUN_API_KEY }}
          aws_secret_access_key: ${{ secrets.UPYUN_API_SECRET }}
          aws_bucket: ${{ secrets.UPYUN_BUCKET }}
          source_dir: upload
          destination_dir: core/${{ steps.version.outputs.project }}/${{ steps.version.outputs.version }}/linux
          endpoint: https://s3.api.upyun.com

